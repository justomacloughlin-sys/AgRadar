<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#07090B" />
  <title>AgRadar — Inteligencia Agro Argentina</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <script defer src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js" crossorigin></script>
  <script defer src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script defer src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script defer src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    :root{
      --bg:#07090B;
      --bg2:#0B1014;
      --panel:rgba(16,22,27,.68);
      --panel2:rgba(17,26,31,.86);
      --panel3:rgba(255,255,255,.055);
      --stroke:rgba(255,255,255,.105);
      --stroke2:rgba(79,224,168,.25);
      --text:#F4F8F6;
      --muted:#8B9893;
      --muted2:#B2BDB8;
      --mint:#4FE0A8;
      --mint2:#88FFD0;
      --blue:#7BB8FF;
      --amber:#F6C766;
      --red:#FF6B7A;
      --green:#4FE0A8;
      --violet:#A78BFA;
      --shadow:0 28px 80px rgba(0,0,0,.38);
      --softShadow:0 16px 40px rgba(0,0,0,.22);
      --radius:24px;
      --radius2:16px;
      --blur:blur(22px);
    }
    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{
      margin:0;
      min-height:100vh;
      background:
        radial-gradient(circle at 12% -10%, rgba(79,224,168,.16), transparent 34%),
        radial-gradient(circle at 88% 0%, rgba(123,184,255,.11), transparent 30%),
        radial-gradient(circle at 70% 88%, rgba(167,139,250,.09), transparent 28%),
        linear-gradient(180deg,#07090B 0%,#081014 46%,#07090B 100%);
      color:var(--text);
      font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      overflow-x:hidden;
    }
    body:before{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      background-image:
        linear-gradient(rgba(255,255,255,.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.025) 1px, transparent 1px);
      background-size:64px 64px;
      mask-image:linear-gradient(to bottom, rgba(0,0,0,.75), transparent 78%);
      z-index:0;
    }
    a{color:inherit;text-decoration:none}
    button,input,select{font:inherit}
    button{cursor:pointer}
    .app{position:relative;z-index:1;display:grid;grid-template-columns:288px minmax(0,1fr);min-height:100vh}
    .sidebar{
      position:sticky;top:0;height:100vh;padding:26px 18px;border-right:1px solid var(--stroke);
      background:linear-gradient(180deg,rgba(7,9,11,.92),rgba(7,9,11,.72));
      backdrop-filter:var(--blur);
      display:flex;flex-direction:column;gap:18px;
    }
    .brand{display:flex;align-items:center;gap:12px;padding:0 8px 16px;border-bottom:1px solid var(--stroke)}
    .logo{
      width:42px;height:42px;border-radius:15px;
      background:linear-gradient(135deg,rgba(79,224,168,.95),rgba(123,184,255,.78));
      display:grid;place-items:center;box-shadow:0 16px 44px rgba(79,224,168,.26), inset 0 1px 0 rgba(255,255,255,.45);
      color:#04110c;font-weight:900;font-family:Space Grotesk,Inter;font-size:18px;
    }
    .brand h1{font-family:Space Grotesk,Inter;margin:0;font-size:20px;letter-spacing:-.03em}
    .brand span{display:block;color:var(--muted);font-size:12px;margin-top:2px}
    .nav{display:flex;flex-direction:column;gap:6px;margin-top:2px}
    .nav button{
      width:100%;background:transparent;border:1px solid transparent;color:var(--muted2);border-radius:15px;
      padding:12px 12px;display:flex;align-items:center;gap:10px;transition:.22s ease;text-align:left;
    }
    .nav button:hover{background:rgba(255,255,255,.055);color:var(--text);transform:translateX(2px)}
    .nav button.active{background:linear-gradient(135deg,rgba(79,224,168,.15),rgba(123,184,255,.06));border-color:rgba(79,224,168,.24);color:var(--text);box-shadow:inset 0 1px 0 rgba(255,255,255,.08)}
    .navIcon{width:25px;height:25px;border-radius:10px;display:grid;place-items:center;background:rgba(255,255,255,.06)}
    .sideCard{margin-top:auto;padding:16px;border-radius:20px;background:rgba(255,255,255,.045);border:1px solid var(--stroke);box-shadow:var(--softShadow)}
    .sideCard b{display:block;font-size:13px;margin-bottom:8px}.sideCard p{margin:0;color:var(--muted);font-size:12px;line-height:1.45}
    .main{min-width:0;padding:28px 30px 70px}
    .topbar{display:flex;align-items:flex-start;justify-content:space-between;gap:18px;margin-bottom:22px}
    .eyebrow{display:inline-flex;gap:8px;align-items:center;color:var(--mint);font-weight:700;font-size:12px;letter-spacing:.08em;text-transform:uppercase;background:rgba(79,224,168,.09);border:1px solid rgba(79,224,168,.19);padding:8px 10px;border-radius:999px}
    .title{font-family:Space Grotesk,Inter;font-size:clamp(36px,6vw,68px);line-height:.95;letter-spacing:-.07em;margin:14px 0 12px;max-width:940px}
    .subtitle{color:var(--muted2);font-size:16px;line-height:1.55;max-width:760px;margin:0}
    .topActions{display:flex;gap:10px;align-items:center;flex-wrap:wrap;justify-content:flex-end}
    .btn{
      border:1px solid var(--stroke);color:var(--text);background:rgba(255,255,255,.055);border-radius:14px;padding:11px 14px;
      display:inline-flex;align-items:center;gap:8px;transition:.22s ease;box-shadow:inset 0 1px 0 rgba(255,255,255,.06);white-space:nowrap;
    }
    .btn:hover{transform:translateY(-1px);border-color:rgba(255,255,255,.18);background:rgba(255,255,255,.08)}
    .btn.primary{background:linear-gradient(135deg,rgba(79,224,168,.92),rgba(123,184,255,.82));color:#06110d;border-color:transparent;font-weight:800;box-shadow:0 18px 48px rgba(79,224,168,.18)}
    .btn.ghost{background:transparent}.btn.small{padding:8px 10px;font-size:12px;border-radius:12px}
    .userPill{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:999px;background:rgba(255,255,255,.05);border:1px solid var(--stroke);color:var(--muted2);font-size:13px}
    .avatar{width:28px;height:28px;border-radius:50%;display:grid;place-items:center;background:linear-gradient(135deg,var(--mint),var(--blue));color:#06110d;font-weight:900}
    .grid{display:grid;gap:16px}.grid.cols4{grid-template-columns:repeat(4,minmax(0,1fr))}.grid.cols3{grid-template-columns:repeat(3,minmax(0,1fr))}.grid.cols2{grid-template-columns:repeat(2,minmax(0,1fr))}
    .card{
      position:relative;overflow:hidden;border:1px solid var(--stroke);border-radius:var(--radius);background:linear-gradient(180deg,rgba(255,255,255,.075),rgba(255,255,255,.04));
      backdrop-filter:var(--blur);box-shadow:var(--softShadow);transition:.24s ease;
    }
    .card:before{content:"";position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.11),transparent 28%,rgba(79,224,168,.035) 82%,transparent);pointer-events:none;opacity:.7}
    .card:hover{border-color:rgba(79,224,168,.22);transform:translateY(-2px);box-shadow:0 22px 70px rgba(0,0,0,.3)}
    .cardInner{position:relative;padding:18px}.card.big .cardInner{padding:22px}.cardHeader{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:14px}
    .card h3{font-family:Space Grotesk,Inter;margin:0;font-size:18px;letter-spacing:-.03em}.card .hint{color:var(--muted);font-size:12px;line-height:1.45;margin-top:5px}
    .metric{font-family:Space Grotesk,Inter;font-size:30px;letter-spacing:-.05em;font-weight:700;margin:6px 0 2px}.metric.small{font-size:22px}
    .unit{font-size:13px;color:var(--muted);font-family:Inter;margin-left:5px}.delta{display:inline-flex;gap:5px;align-items:center;font-size:12px;color:var(--mint);background:rgba(79,224,168,.1);border:1px solid rgba(79,224,168,.18);padding:5px 8px;border-radius:999px}.delta.warn{color:var(--amber);background:rgba(246,199,102,.1);border-color:rgba(246,199,102,.18)}.delta.bad{color:var(--red);background:rgba(255,107,122,.1);border-color:rgba(255,107,122,.18)}
    .source{font-size:11px;color:var(--muted);display:inline-flex;gap:5px;align-items:center}.source:before{content:"";width:6px;height:6px;border-radius:50%;background:var(--mint);box-shadow:0 0 14px var(--mint)}
    .row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}.stack{display:flex;flex-direction:column;gap:12px}
    .divider{height:1px;background:var(--stroke);margin:14px 0}.muted{color:var(--muted)}.muted2{color:var(--muted2)}
    label{font-size:12px;color:var(--muted2);display:block;margin-bottom:7px;font-weight:600}.field{width:100%;background:rgba(0,0,0,.22);border:1px solid var(--stroke);border-radius:14px;color:var(--text);padding:11px 12px;outline:none;transition:.22s ease}.field:focus{border-color:rgba(79,224,168,.44);box-shadow:0 0 0 4px rgba(79,224,168,.08)}
    select.field{appearance:none;background-image:linear-gradient(45deg,transparent 50%,var(--muted) 50%),linear-gradient(135deg,var(--muted) 50%,transparent 50%);background-position:calc(100% - 18px) 17px,calc(100% - 12px) 17px;background-size:6px 6px;background-repeat:no-repeat}
    .formGrid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}.formGrid.three{grid-template-columns:repeat(3,minmax(0,1fr))}
    .badge{display:inline-flex;align-items:center;gap:6px;border-radius:999px;border:1px solid var(--stroke);background:rgba(255,255,255,.055);padding:6px 9px;font-size:12px;color:var(--muted2);white-space:nowrap}.badge.mint{border-color:rgba(79,224,168,.25);background:rgba(79,224,168,.1);color:var(--mint)}.badge.amber{border-color:rgba(246,199,102,.25);background:rgba(246,199,102,.1);color:var(--amber)}.badge.red{border-color:rgba(255,107,122,.25);background:rgba(255,107,122,.1);color:var(--red)}.badge.blue{border-color:rgba(123,184,255,.24);background:rgba(123,184,255,.1);color:var(--blue)}
    .section{display:none}.section.active{display:block;animation:fadeUp .34s ease both}@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
    .kpiStrip{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin:24px 0 16px}.kpi{padding:16px;border-radius:20px;background:rgba(255,255,255,.045);border:1px solid var(--stroke);box-shadow:var(--softShadow)}.kpi small{display:block;color:var(--muted);font-size:12px}.kpi b{font-family:Space Grotesk;font-size:22px;letter-spacing:-.04em;display:block;margin-top:6px}
    .scoreRing{width:172px;height:172px;border-radius:50%;display:grid;place-items:center;margin:auto;position:relative;background:conic-gradient(var(--mint) calc(var(--score)*1%),rgba(255,255,255,.08) 0)}.scoreRing:after{content:"";position:absolute;inset:12px;border-radius:50%;background:#0B1114;border:1px solid var(--stroke);box-shadow:inset 0 0 30px rgba(0,0,0,.38)}.scoreRing .inside{position:relative;z-index:1;text-align:center}.scoreRing strong{font-family:Space Grotesk;font-size:44px;letter-spacing:-.08em}.scoreRing span{display:block;color:var(--muted);font-size:12px;margin-top:-3px}
    .verdict{font-family:Space Grotesk;font-size:17px;letter-spacing:-.02em;padding:10px 12px;border-radius:14px;text-align:center;border:1px solid var(--stroke);background:rgba(255,255,255,.055)}
    .factor{display:grid;grid-template-columns:38px 1fr auto;gap:11px;align-items:start;padding:12px;border:1px solid var(--stroke);background:rgba(255,255,255,.035);border-radius:16px}.factorSign{width:32px;height:32px;border-radius:12px;display:grid;place-items:center;font-weight:900}.factorSign.plus{background:rgba(79,224,168,.12);color:var(--mint);border:1px solid rgba(79,224,168,.25)}.factorSign.minus{background:rgba(255,107,122,.12);color:var(--red);border:1px solid rgba(255,107,122,.25)}.factorSign.equal{background:rgba(246,199,102,.11);color:var(--amber);border:1px solid rgba(246,199,102,.22)}.factor b{font-size:13px}.factor p{margin:4px 0 0;color:var(--muted);font-size:12px;line-height:1.42}.weight{font-size:11px;color:var(--muted);padding:5px 7px;border:1px solid var(--stroke);border-radius:999px}
    .chartBox{height:280px;position:relative}.chartBox.small{height:220px}.chartBox canvas{width:100%!important;height:100%!important}
    .heatmap{display:grid;gap:5px}.heatHeader,.heatRow{display:grid;grid-template-columns:128px repeat(7,minmax(52px,1fr));gap:5px}.heatCell{min-height:42px;border-radius:12px;display:grid;place-items:center;font-size:11px;border:1px solid rgba(255,255,255,.06);background:rgba(255,255,255,.04);position:relative;overflow:hidden}.heatCell.head{color:var(--muted2);font-weight:700;background:rgba(255,255,255,.055)}.heatCell .corr{font-family:Space Grotesk;font-weight:700}.heatCell:hover{outline:1px solid rgba(255,255,255,.24);z-index:3;transform:scale(1.03)}
    .alert{padding:12px 13px;border-radius:16px;border:1px solid rgba(246,199,102,.24);background:linear-gradient(135deg,rgba(246,199,102,.12),rgba(255,255,255,.035));color:var(--muted2);font-size:13px;line-height:1.45}.alert b{color:var(--amber)}.alert.green{border-color:rgba(79,224,168,.24);background:linear-gradient(135deg,rgba(79,224,168,.11),rgba(255,255,255,.035))}.alert.green b{color:var(--mint)}.alert.red{border-color:rgba(255,107,122,.24);background:linear-gradient(135deg,rgba(255,107,122,.11),rgba(255,255,255,.035))}.alert.red b{color:var(--red)}
    .satellite{height:330px;border-radius:22px;overflow:hidden;border:1px solid var(--stroke);background:linear-gradient(135deg,rgba(79,224,168,.09),rgba(123,184,255,.09));position:relative}.satellite img{width:100%;height:100%;object-fit:cover;filter:saturate(1.18) contrast(1.08) brightness(.86)}.satellite .overlay{position:absolute;inset:auto 14px 14px 14px;display:flex;align-items:center;justify-content:space-between;gap:10px;padding:10px 12px;border-radius:16px;background:rgba(5,8,10,.72);border:1px solid var(--stroke);backdrop-filter:blur(16px)}
    .threshold{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.065)}.threshold:last-child{border-bottom:0}.bar{height:8px;border-radius:999px;background:rgba(255,255,255,.08);overflow:hidden}.bar span{display:block;height:100%;background:linear-gradient(90deg,var(--red),var(--amber),var(--mint));border-radius:inherit;width:var(--w)}
    .soilGrid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px}.soilItem{padding:12px;border-radius:16px;border:1px solid var(--stroke);background:rgba(255,255,255,.04)}.soilItem small{display:block;color:var(--muted);font-size:11px}.soilItem b{font-family:Space Grotesk;font-size:19px;margin-top:4px;display:block}.soilMeter{height:9px;border-radius:999px;background:rgba(255,255,255,.08);overflow:hidden;margin-top:9px}.soilMeter span{display:block;height:100%;border-radius:inherit;background:linear-gradient(90deg,rgba(79,224,168,.65),rgba(123,184,255,.72));width:var(--w)}
    .table{width:100%;border-collapse:separate;border-spacing:0 8px}.table th{font-size:11px;color:var(--muted);text-align:left;font-weight:700;padding:0 10px}.table td{background:rgba(255,255,255,.045);border-top:1px solid var(--stroke);border-bottom:1px solid var(--stroke);padding:11px 10px;font-size:13px;color:var(--muted2)}.table tr td:first-child{border-left:1px solid var(--stroke);border-radius:14px 0 0 14px;color:var(--text);font-weight:700}.table tr td:last-child{border-right:1px solid var(--stroke);border-radius:0 14px 14px 0}
    .thermo{height:22px;border-radius:999px;background:linear-gradient(90deg,var(--red),var(--amber),var(--mint));position:relative;box-shadow:inset 0 0 0 1px rgba(255,255,255,.15);margin:20px 0}.thermo:after{content:"";position:absolute;top:-8px;left:calc(var(--p)*1%);transform:translateX(-50%);width:6px;height:38px;border-radius:999px;background:#fff;box-shadow:0 0 22px rgba(255,255,255,.55)}
    .modalBackdrop{position:fixed;inset:0;z-index:20;display:grid;place-items:center;background:rgba(0,0,0,.58);backdrop-filter:blur(16px);padding:20px}.modal{width:min(520px,100%);border-radius:28px;border:1px solid var(--stroke);background:linear-gradient(180deg,rgba(20,28,33,.94),rgba(7,9,11,.92));box-shadow:0 30px 100px rgba(0,0,0,.6);padding:24px}.modal h2{font-family:Space Grotesk;font-size:34px;letter-spacing:-.06em;margin:8px 0}.loginBtn{width:100%;justify-content:center;margin-top:10px;font-weight:800}.loginBtn.apple{background:#F3F6F4;color:#050606}.loginBtn.google{background:rgba(255,255,255,.06)}
    .skeleton{position:relative;overflow:hidden;background:rgba(255,255,255,.055);border-radius:14px;min-height:20px}.skeleton:after{content:"";position:absolute;inset:0;transform:translateX(-100%);background:linear-gradient(90deg,transparent,rgba(255,255,255,.12),transparent);animation:shimmer 1.4s infinite}@keyframes shimmer{100%{transform:translateX(100%)}}
    .tooltip{position:relative;border-bottom:1px dotted rgba(255,255,255,.35);cursor:help}.tooltip:hover:after{content:attr(data-tip);position:absolute;left:0;bottom:calc(100% + 10px);width:280px;padding:10px 12px;border-radius:14px;background:#0D1418;border:1px solid var(--stroke);box-shadow:var(--softShadow);color:var(--muted2);font-size:12px;line-height:1.45;z-index:20}.confetti{position:fixed;inset:0;pointer-events:none;z-index:30;overflow:hidden}.confetti i{position:absolute;width:8px;height:12px;border-radius:3px;background:var(--mint);animation:fall 1.35s ease-out forwards;top:-20px}@keyframes fall{to{transform:translateY(110vh) rotate(380deg);opacity:0}}
    .footer{margin-top:26px;color:var(--muted);font-size:12px;line-height:1.6}.mobileToggle{display:none}
    @media (max-width:1100px){.app{grid-template-columns:1fr}.sidebar{position:fixed;z-index:15;left:14px;right:14px;top:auto;bottom:14px;height:auto;border:1px solid var(--stroke);border-radius:24px;padding:10px;background:rgba(7,9,11,.82);box-shadow:var(--shadow)}.brand,.sideCard{display:none}.nav{flex-direction:row;overflow:auto;margin:0}.nav button{min-width:124px;justify-content:center}.main{padding:22px 18px 120px}.grid.cols4{grid-template-columns:repeat(2,minmax(0,1fr))}.kpiStrip{grid-template-columns:repeat(2,minmax(0,1fr))}.topbar{flex-direction:column}.topActions{justify-content:flex-start}.heatHeader,.heatRow{grid-template-columns:104px repeat(7,68px);min-width:630px}.heatmap{overflow:auto;padding-bottom:8px}.soilGrid{grid-template-columns:repeat(2,minmax(0,1fr))}}
    @media (max-width:720px){.grid.cols2,.grid.cols3,.grid.cols4,.formGrid,.formGrid.three{grid-template-columns:1fr}.title{font-size:43px}.cardInner,.card.big .cardInner{padding:16px}.main{padding-left:14px;padding-right:14px}.kpiStrip{grid-template-columns:1fr}.satellite{height:260px}.topActions .btn{width:100%;justify-content:center}.userPill{width:100%;justify-content:center}.soilGrid{grid-template-columns:1fr}.nav button{min-width:96px;font-size:12px;padding:10px 8px}.navIcon{display:none}}

    .bootScreen{min-height:100vh;display:grid;place-items:center;padding:26px;color:var(--text)}
    .bootBox{width:min(560px,100%);padding:26px;border:1px solid var(--stroke);border-radius:24px;background:rgba(16,22,27,.72);backdrop-filter:blur(22px);box-shadow:var(--shadow)}
    .bootLogo{width:44px;height:44px;border-radius:14px;display:grid;place-items:center;margin-bottom:16px;background:linear-gradient(135deg,rgba(79,224,168,.95),rgba(123,184,255,.85));color:#06100C;font-weight:900;font-family:Space Grotesk,Inter,sans-serif}
    .bootBox h1{margin:0 0 8px;font-family:Space Grotesk,Inter,sans-serif;font-size:28px}.bootBox p{margin:0;color:var(--muted2);line-height:1.55}.bootHint{margin-top:14px;padding:12px;border-radius:16px;background:rgba(255,255,255,.055);font-size:13px;color:var(--muted2)}
    .bootDots{display:flex;gap:6px;margin-top:18px}.bootDots span{width:8px;height:8px;border-radius:999px;background:var(--mint);animation:pulse 1s infinite ease-in-out}.bootDots span:nth-child(2){animation-delay:.15s}.bootDots span:nth-child(3){animation-delay:.3s}@keyframes pulse{0%,100%{opacity:.35;transform:translateY(0)}50%{opacity:1;transform:translateY(-3px)}}
  </style>
</head>
<body>
  <div id="root"><div class="bootScreen"><div class="bootBox"><div class="bootLogo">AR</div><h1>AgRadar está cargando</h1><p id="bootStatus">Inicializando React, Chart.js y fuentes públicas.</p><div class="bootHint">Si abrís el archivo desde el teléfono como <b>file://</b>, algunos navegadores bloquean librerías externas. En GitHub Pages debería cargar mejor.</div><div class="bootDots"><span></span><span></span><span></span></div></div></div></div>
  <script type="text/babel">
    window.__AGRADAR_RENDERED__ = false;
    function showBootError(message){
      const el = document.getElementById('bootStatus');
      if(el){
        el.innerHTML = `<b>No pudo renderizarse la app.</b><br>${message}<br><span style="color:#8B9893">Probá abrirlo desde GitHub Pages o revisar la consola del navegador.</span>`;
      }
    }
    window.addEventListener('error', (e)=>showBootError(e.message || 'Error JavaScript desconocido.'));

    async function fetchJson(url, timeout=9000){
      const controller = new AbortController();

        if(!res.ok) throw new Error(`HTTP ${res.status}`);
        return await res.json();
      } finally { clearTimeout(id); }

      return {key, nombre: row.nombre || row.casa || key, compra: row.compra, venta: row.venta, fecha: row.fechaActualizacion || row.fecha};
    }

    async function loadGrains(){
      // BCR/Matba often restrict direct browser access. This tries a public CORS relay and degrades gracefully.
      try{
        const proxy = `https://api.allorigins.win/raw?url=${encodeURIComponent(PUBLIC_ENDPOINTS.bcr)}`;
        const txt = await (await fetch(proxy, {cache:'no-store'})).text();
        const extract = (name, fallback) => {
          const clean = txt.replace(/\s+/g,' ');
          const ix = clean.toLowerCase().indexOf(name.toLowerCase());
          if(ix < 0) return fallback;
          const slice = clean.slice(ix, ix+900);
          const usd = slice.match(/US\$\s*([0-9]{2,3}(?:[,.][0-9]{1,2})?)/);
          const ars = slice.match(/\$\s*([0-9.]{3,}(?:,[0-9]{2})?)/);
          return {...fallback, usd: usd ? Number(usd[1].replace('.','').replace(',','.')) : fallback.usd, bcr: ars ? Number(ars[1].replace(/\./g,'').replace(',','.')) : fallback.bcr};
        };
        return {data:{maiz:extract('Maiz', MARKET_DEFAULTS.maiz), soja:extract('Soja', MARKET_DEFAULTS.soja), trigo:extract('Trigo', MARKET_DEFAULTS.trigo), girasol:extract('Girasol', MARKET_DEFAULTS.girasol)},source:"BCR / CAC vía estructura pública",live:true};
      }catch(e){
        return {data:MARKET_DEFAULTS,source:"Fallback local + estructura BCR/Matba",live:false};
      }
    }

    function stableNoise(seed){
      let h = 2166136261;
      for(let i=0;i<seed.length;i++){h^=seed.charCodeAt(i);h+=(h<<1)+(h<<4)+(h<<7)+(h<<8)+(h<<24)}
      return ((h>>>0)%1000)/1000;
    }

    function satelliteMetrics({crop, stage, region, weather, lat, lon}){
      const base = CROP_PRESETS[crop].ndviBase;
      const soil = weather?.hourly?.soil_moisture_0_to_1cm?.[0] ?? .24;
      const humidity = weather?.current?.relative_humidity_2m ?? 60;
      const climateAdj = clamp((soil-.23)*.7 + (humidity-60)/650, -.08, .08);
      const season = Math.sin((new Date().getMonth()+1)/12*Math.PI*2)*.025;
      const noise = (stableNoise(`${lat}-${lon}-${crop}-${stage}-${todayISO()}`)-.5)*.045;
      const ndvi = clamp(base + (STAGE_ADJ[stage]||0) + (REGION_ADJ[region]||0) + climateAdj + season + noise, .18, .92);
      const evi = clamp(ndvi*.78 + .055 + (soil-.24)*.18, .14, .82);
      const stress = ndvi < thresholdFor(crop, stage, region).warning ? "Estrés" : ndvi < thresholdFor(crop, stage, region).good ? "Vigilar" : "Normal";
      return {ndvi:+ndvi.toFixed(2), evi:+evi.toFixed(2), stress};
    }

    function thresholdFor(crop, stage, region){
      const base = CROP_PRESETS[crop].ndviBase + (STAGE_ADJ[stage]||0) + (REGION_ADJ[region]||0);
      return {critical:clamp(base-.20,.15,.72), warning:clamp(base-.11,.22,.82), good:clamp(base-.02,.34,.88), excellent:clamp(base+.08,.45,.94)};
    }

    function recomendar(inputs){
      const local = Number(inputs.localPrice)||0;
      const parity = Number(inputs.importParity)||0;
      const gap = parity ? ((parity-local)/parity)*100 : 0;
      const ratioGap = Number(inputs.ratioGap)||0;
      const trend = inputs.trend;
      const supply = inputs.supply;
      const factors = [];
      const push = (key,title,weight,value,explain) => factors.push({key,title,weight,value,sign:value>0?'+':value<0?'−':'=',kind:value>0?'plus':value<0?'minus':'equal',explain});
      push('paridad','Brecha de paridad de importación',1.4, gap>7 ? 1 : gap<-5 ? -1 : 0, gap>7 ? `El precio local está ${pct(gap)} debajo del costo de reposición importado: riesgo de suba.` : gap<-5 ? `El precio local está ${pct(Math.abs(gap))} por encima de la paridad: no fuerza compra.` : `Brecha de ${pct(gap)}: señal todavía mixta.`);
      push('ratio','Relación insumo/grano histórica',1.3, ratioGap<-6 ? 1 : ratioGap>8 ? -1 : 0, ratioGap<-6 ? `La relación está ${pct(Math.abs(ratioGap))} mejor que el promedio histórico.` : ratioGap>8 ? `La relación está ${pct(ratioGap)} peor que el promedio histórico.` : `La relación está cerca del promedio histórico.`);
      push('trend','Tendencia internacional',0.85, trend==='alcista'?1:trend==='bajista'?-1:0, trend==='alcista'?'Urea/fosfatados y energía con sesgo alcista: conviene cubrir una parte.':trend==='bajista'?'Tendencia externa floja: no hay urgencia táctica.':'Mercado internacional lateral: priorizar ejecución y precio relativo.');
      push('supply','Oferta / Demanda',0.9, supply==='ajustada'?1:supply==='holgada'?-1:0, supply==='ajustada'?'Oferta corta o logística tensionada: aumenta riesgo de reposición.':supply==='holgada'?'Oferta cómoda: mayor poder de negociación del comprador.':'Balance físico normal, sin señal dominante.');
      const favorables = factors.filter(f=>f.value>0).length;
      const bonus = favorables>=2 ? .6 : 0;
      const raw = factors.reduce((a,f)=>a+f.value*f.weight,0)+bonus;
      const score = clamp(Math.round(52 + raw*12.5),0,100);
      let verdict = 'NEUTRAL', color='amber';
      if(score>=78){verdict='ABASTECERSE YA'; color='mint'}
      else if(score>=62){verdict='COMPRA SELECTIVA'; color='blue'}
      else if(score>=48){verdict='NEUTRAL'; color='amber'}
      else if(score>=35){verdict='SOLO LO INDISPENSABLE'; color='amber'}
      else {verdict='ESPERAR'; color='red'}
      return {score, verdict, color, factors, bonus, gap, favorables};
    }

    function makeSeries(seedBase=1){
      const months = 120;
      const mk = (trend, vol, phase=0) => Array.from({length:months},(_,i)=>trend*i + Math.sin(i/7+phase)*vol + Math.sin(i/23+phase)*vol*.7 + (stableNoise(`${seedBase}-${i}-${phase}`)-.5)*vol*.95);
      const dollar = mk(1.2,8,0).map((v,i)=>100+v+i*.7);
      const grains = mk(.35,12,1).map((v,i)=>170+v+i*.15 + dollar[i]*.12);
      const inputs = mk(.42,14,2).map((v,i)=>250+v+i*.22 + dollar[i]*.18);
      const ndvi = mk(.002,.08,3).map((v,i)=>.58+v-Math.max(0,(i-80))/1000);
      const futures = mk(.28,10,4).map((v,i)=>180+v+i*.12 + ndvi[i]*22);
      const inflation = mk(.1,4,5).map((v,i)=>3.2+Math.abs(v/15));
      const rates = mk(.05,3,6).map((v,i)=>35+v);
      const gap = dollar.map((d,i)=>((d/(80+i*.7))-1)*100 + Math.sin(i/11)*4);
      return {"Dólar blue":dollar,"Granos":grains,"Insumos":inputs,"NDVI":ndvi,"Futuros":futures,"Inflación":inflation,"Tasas":rates,"Brecha FX":gap};
    }

    function corr(a,b){
      const n=Math.min(a.length,b.length), av=a.slice(0,n).reduce((x,y)=>x+y,0)/n, bv=b.slice(0,n).reduce((x,y)=>x+y,0)/n;
      let num=0, da=0, db=0; for(let i=0;i<n;i++){const xa=a[i]-av, xb=b[i]-bv; num+=xa*xb; da+=xa*xa; db+=xb*xb}
      return num/Math.sqrt(da*db || 1);
    }

    function correlationMatrix(series){
      const keys = ["Dólar blue","Granos","Insumos","NDVI","Futuros","Inflación","Tasas"];
      return keys.map(k=>keys.map(j=>corr(series[k],series[j])));
    }

    function detectRuptures(series){
      const pairs = [["Dólar blue","Granos"],["Insumos","Granos"],["NDVI","Futuros"],["Brecha FX","Insumos"],["Tasas","Granos"]];
      return pairs.map(([a,b])=>{
        const hist = corr(series[a].slice(0,96),series[b].slice(0,96));
        const recent = corr(series[a].slice(96),series[b].slice(96));
        const delta = recent-hist;
        return {a,b,hist,recent,delta,rupture:Math.abs(delta)>0.34, rec: delta>0 ? 'Mayor sensibilidad: cubrir exposición parcial.' : 'Menor transmisión: evitar extrapolar la relación vieja.'};
      });
    }

            <div className="cardHeader"><div><h3>Señal satelital</h3><p className="hint">NDVI/EVI por cultivo, etapa y región.</p></div><Source>Powered by NASA</Source></div>

              <Field label="Insumo"><select className="field" value={inputs.inputName} onChange={e=>setInputs({...inputs,inputName:e.target.value})}><option>Urea</option><option>MAP</option><option>DAP</option><option>Glifosato</option><option>Semilla maíz</option></select></Field>

    function NDVISection({prefs,setPrefs,weatherPack,satellite,setSatellite}){
      const crop = CROP_PRESETS[prefs.crop]; const thresholds = thresholdFor(prefs.crop,prefs.stage,prefs.region);
      const region = REGIONS[prefs.region];
      function saveLocation(){ localStorage.setItem('agradar-location', JSON.stringify({region:prefs.region,lat:prefs.lat,lon:prefs.lon})); alert('Ubicación guardada como campo por defecto.'); }
      function useBrowserLocation(){
        if(!navigator.geolocation) return alert('Tu navegador no permite geolocalización.');
        navigator.geolocation.getCurrentPosition(pos=>{
          const next = {...prefs, lat:pos.coords.latitude, lon:pos.coords.longitude}; setPrefs(next); localStorage.setItem('agradar-location', JSON.stringify({region:prefs.region,lat:next.lat,lon:next.lon}));
        },()=>alert('No pude acceder a tu ubicación. Podés cargar coordenadas manuales.'));
      }
      useEffect(()=>setSatellite(satelliteMetrics({crop:prefs.crop,stage:prefs.stage,region:prefs.region,weather:weatherPack?.data,lat:prefs.lat,lon:prefs.lon})),[prefs.crop,prefs.stage,prefs.region,prefs.lat,prefs.lon,weatherPack?.data]);
      const entries = [{label:'Crítico',v:thresholds.critical,type:'red'},{label:'Alerta',v:thresholds.warning,type:'amber'},{label:'Bueno',v:thresholds.good,type:'mint'},{label:'Excelente',v:thresholds.excellent,type:'mint'}];
      return <div className="section active">
        <div className="grid cols2">
          <div className="card big"><div className="cardInner">
            <div className="cardHeader"><div><h3>NDVI dinámico por cultivo</h3><p className="hint">Umbrales ajustados por etapa fenológica, región y humedad de suelo.</p></div><Source>Powered by NASA</Source></div>
            <div className="formGrid three">
              <Field label="Región"><select className="field" value={prefs.region} onChange={e=>{const r=REGIONS[e.target.value];setPrefs({...prefs,region:e.target.value,lat:r.lat,lon:r.lon})}}>{Object.keys(REGIONS).map(r=><option key={r}>{r}</option>)}</select></Field>
              <Field label="Cultivo"><select className="field" value={prefs.crop} onChange={e=>{const stages=CROP_PRESETS[e.target.value].stages;setPrefs({...prefs,crop:e.target.value,stage:stages[0]})}}>{Object.entries(CROP_PRESETS).map(([k,v])=><option key={k} value={k}>{v.label}</option>)}</select></Field>
              <Field label="Etapa"><select className="field" value={prefs.stage} onChange={e=>setPrefs({...prefs,stage:e.target.value})}>{crop.stages.map(s=><option key={s}>{s}</option>)}</select></Field>
              <Field label="Latitud"><input className="field" type="number" step="0.0001" value={prefs.lat} onChange={e=>setPrefs({...prefs,lat:e.target.value})}/></Field>
              <Field label="Longitud"><input className="field" type="number" step="0.0001" value={prefs.lon} onChange={e=>setPrefs({...prefs,lon:e.target.value})}/></Field>
              <div style={{display:'flex',alignItems:'end',gap:8}}><button className="btn" onClick={useBrowserLocation}>Usar mi ubicación</button><button className="btn primary" onClick={saveLocation}>Guardar</button></div>
            </div>
            <div className="divider"></div>
            <div className="grid cols2"><div><div className="metric">{satellite.ndvi}<span className="unit">NDVI</span></div><Badge type={satellite.stress==='Normal'?'mint':satellite.stress==='Vigilar'?'amber':'red'}>{satellite.stress}</Badge></div><div><div className="metric">{satellite.evi}<span className="unit">EVI</span></div><Badge type="blue">{region.provincia}</Badge></div></div>
            <div style={{marginTop:14}}>{entries.map(e=><div className="threshold" key={e.label}><div><span className={`badge ${e.type}`}>{e.label}</span><div className="bar" style={{'--w':`${e.v*100}%`,marginTop:8}}><span></span></div></div><b>{e.v.toFixed(2)}</b></div>)}</div>
          </div></div>
          <div className="card big"><div className="cardInner"><div className="cardHeader"><div><h3>Imagen satelital NASA</h3><p className="hint">Capa MODIS/GIBS de la zona. Abrí Worldview para explorar fecha y capas.</p></div><Badge type="mint">NASA live</Badge></div><div className="satellite"><img src={nasaImageUrl(Number(prefs.lat),Number(prefs.lon))} onError={e=>{e.currentTarget.style.display='none'}}/><div className="overlay"><span>Lat {Number(prefs.lat).toFixed(3)} · Lon {Number(prefs.lon).toFixed(3)}</span><Badge type="mint">Powered by NASA</Badge></div></div><button className="btn primary" style={{marginTop:12,width:'100%',justifyContent:'center'}} onClick={()=>window.open(worldviewUrl(Number(prefs.lat),Number(prefs.lon)),'_blank')}>Ver imagen satelital NASA de mi zona</button></div></div>
        </div>
        <div className="grid cols2" style={{marginTop:16}}>
          <div className="card"><div className="cardInner"><h3>Perfil de suelos</h3><p className="hint">Preset regional editable para lectura agronómica.</p><div className="soilGrid" style={{marginTop:14}}>{[{l:'Materia orgánica',v:region.mo,u:'%',p:region.mo/4*100},{l:'pH',v:region.ph,u:'',p:region.ph/8*100},{l:'Fertilidad',v:region.fertility,u:'/100',p:region.fertility},{l:'Suelo',v:region.soil,u:'',p:75}].map(x=><div className="soilItem" key={x.l}><small>{x.l}</small><b>{x.v}{x.u}</b><div className="soilMeter" style={{'--w':`${x.p}%`}}><span></span></div></div>)}</div></div></div>
          <div className="card"><div className="cardInner"><h3>¿Cómo se calcula?</h3><p className="muted2" style={{lineHeight:1.6}}>El umbral base parte del cultivo, se ajusta por etapa fenológica y región, y se corrige por humedad de suelo observada/forecast. La imagen satelital se sirve desde NASA GIBS; la extracción puntual NDVI/EVI productiva requiere integrar Earthdata/LP DAAC o un backend propio para procesar píxeles.</p><div className="row"><Badge type="mint">MODIS NDVI/EVI</Badge><Badge>16 días</Badge><Badge>Campo por defecto en localStorage</Badge></div></div></div>
        </div>
      </div>
    }

    function CorrelationSection(){
      const [series] = useState(()=>makeSeries(Date.now().toString().slice(-4)));
      const keys = ["Dólar blue","Granos","Insumos","NDVI","Futuros","Inflación","Tasas"];
      const matrix = correlationMatrix(series);
      const ruptures = detectRuptures(series);
      const lineData = {labels:Array.from({length:120},(_,i)=>`${2016+Math.floor(i/12)}-${String(i%12+1).padStart(2,'0')}`),datasets:[{label:'Dólar blue índice',data:series['Dólar blue'],borderWidth:2,tension:.35},{label:'Granos índice',data:series['Granos'],borderWidth:2,tension:.35},{label:'Insumos índice',data:series['Insumos'],borderWidth:2,tension:.35}]};
      const colorFor = v => v>0 ? `rgba(79,224,168,${.12+Math.abs(v)*.58})` : `rgba(255,107,122,${.12+Math.abs(v)*.55})`;
      return <div className="section active">
        <div className="grid cols2">
          <div className="card big" style={{gridColumn:'span 2'}}><div className="cardInner"><div className="cardHeader"><div><h3>Heatmap de correlación 5-10 años</h3><p className="hint">Matriz histórica con pares clave: FX, granos, insumos, NDVI, futuros y macro.</p></div><Badge type="blue">Modelo histórico</Badge></div><div className="heatmap"><div className="heatHeader"><div className="heatCell head">Variable</div>{keys.map(k=><div className="heatCell head" key={k}>{k.split(' ')[0]}</div>)}</div>{keys.map((k,i)=><div className="heatRow" key={k}><div className="heatCell head">{k}</div>{keys.map((j,c)=><div key={j} className="heatCell" title={`${k} vs ${j}: ${matrix[i][c].toFixed(2)}`} style={{background:colorFor(matrix[i][c])}}><span className="corr">{matrix[i][c].toFixed(2)}</span></div>)}</div>)}</div></div></div>
          <div className="card big"><div className="cardInner"><div className="cardHeader"><div><h3>Series normalizadas</h3><p className="hint">Lectura visual de transmisión dólar → insumos → granos.</p></div></div><ChartCard data={lineData} height="300px"/></div></div>
          <div className="card big"><div className="cardInner"><div className="cardHeader"><div><h3>Rupturas de correlación</h3><p className="hint">Alerta cuando el vínculo reciente se aparta del histórico.</p></div></div><div className="stack">{ruptures.map(r=><div className={`alert ${r.rupture?'red':'green'}`} key={r.a+r.b}><b>{r.rupture?'Ruptura detectada':'Relación estable'}:</b> {r.a} vs {r.b}. Hist. {r.hist.toFixed(2)} · Reciente {r.recent.toFixed(2)}. {r.rec}</div>)}</div></div></div>
        </div>
        <div className="card big" style={{marginTop:16}}><div className="cardInner"><h3>Impacto macro: retenciones, inflación, tasas y brecha</h3><p className="muted2" style={{lineHeight:1.6}}>Motor de lectura: retenciones bajan precio neto; inflación y tasas suben costo financiero; brecha cambiaria distorsiona reposición de insumos; cuando la correlación insumo/grano se rompe, conviene pasar de cobertura direccional a cobertura por capas con triggers de relación insumo/grano.</p><div className="row"><Badge>Retenciones</Badge><Badge>Inflación</Badge><Badge>Tasas en pesos</Badge><Badge>Brecha cambiaria</Badge><Badge>NDVI vs futuros</Badge></div></div></div>
      </div>
    }

    function MarginsSection({prefs,setPrefs,grainsPack,weatherPack,satellite}){
      const [sim,setSim] = useState({price:CROP_PRESETS[prefs.crop].price,yield:CROP_PRESETS[prefs.crop].yield,cost:CROP_PRESETS[prefs.crop].cost,ret:CROP_PRESETS[prefs.crop].ret,soil:75,climate:0});
      useEffect(()=>{const p=CROP_PRESETS[prefs.crop]; const g=grainsPack?.data?.[prefs.crop]; setSim(s=>({...s,price:g?.usd||p.price,yield:p.yield,cost:p.cost,ret:p.ret}))},[prefs.crop,grainsPack?.source]);
      const ndviFactor = clamp(.78 + satellite.ndvi*.38, .72,1.12);
      const soilFactor = clamp(.84 + sim.soil/500, .75,1.06);
      const climateFactor = clamp(1 + Number(sim.climate)/100, .72,1.25);
      const gross = sim.price * sim.yield * ndviFactor * soilFactor * climateFactor;
      const net = gross * (1 - sim.ret/100);
      const margin = net - sim.cost;
      const p = clamp((margin+400)/1400*100,0,100);
      const scenarios = [-15,-7,0,7,15].map(s=>({s, m:(sim.price*(1+s/100)*sim.yield*ndviFactor*soilFactor*(1-sim.ret/100)-sim.cost)}));
      const chartData = {labels:scenarios.map(x=>`${x.s>0?'+':''}${x.s}% precio`),datasets:[{label:'Margen US$/ha',data:scenarios.map(x=>Math.round(x.m)),borderWidth:2,tension:.35,fill:true}]};
      return <div className="section active">
        <div className="grid cols2">
          <div className="card big"><div className="cardInner"><div className="cardHeader"><div><h3>What-If multi-variable</h3><p className="hint">Precios, clima, NDVI, suelos y retenciones con impacto directo en margen.</p></div><Badge type={margin>500?'mint':margin>200?'amber':'red'}>{money(margin,'US$ ')} /ha</Badge></div><div className="formGrid three"><Field label="Cultivo"><select className="field" value={prefs.crop} onChange={e=>{const stages=CROP_PRESETS[e.target.value].stages; setPrefs({...prefs,crop:e.target.value,stage:stages[0]})}}>{Object.entries(CROP_PRESETS).map(([k,v])=><option value={k} key={k}>{v.label}</option>)}</select></Field><Field label="Precio US$/t"><input className="field" type="number" value={sim.price} onChange={e=>setSim({...sim,price:+e.target.value})}/></Field><Field label="Rinde qq/ha"><input className="field" type="number" value={sim.yield} onChange={e=>setSim({...sim,yield:+e.target.value})}/></Field><Field label="Costo US$/ha"><input className="field" type="number" value={sim.cost} onChange={e=>setSim({...sim,cost:+e.target.value})}/></Field><Field label="Retenciones %"><input className="field" type="number" value={sim.ret} onChange={e=>setSim({...sim,ret:+e.target.value})}/></Field><Field label="Clima +/- %"><input className="field" type="number" value={sim.climate} onChange={e=>setSim({...sim,climate:+e.target.value})}/></Field></div><div className="divider"></div><label>Calidad de suelo / fertilidad</label><input type="range" min="35" max="100" value={sim.soil} onChange={e=>setSim({...sim,soil:+e.target.value})} style={{width:'100%'}}/><div className="row"><Badge>NDVI factor {ndviFactor.toFixed(2)}</Badge><Badge>Suelo {sim.soil}/100</Badge><Badge>Retención {pct(sim.ret)}</Badge></div></div></div>
          <div className="card big"><div className="cardInner"><div className="cardHeader"><div><h3>Termómetro de margen</h3><p className="hint">Lectura rápida de presión económica por hectárea.</p></div></div><div className="metric">{money(margin,'US$ ')}<span className="unit">/ha</span></div><div className="thermo" style={{'--p':p}}></div><div className="row"><Badge type="red">Defensivo</Badge><Badge type="amber">Selectivo</Badge><Badge type="mint">Expansivo</Badge></div><div className="divider"></div><ChartCard data={chartData} height="210px"/></div></div>
        </div>
        <div className="grid cols3" style={{marginTop:16}}><div className="card"><div className="cardInner"><h3>Cobertura futuros</h3><p className="muted2">Fijar 25-40% si el margen supera el umbral objetivo. Mantener upside con calls si hay riesgo climático.</p></div></div><div className="card"><div className="cardInner"><h3>Opciones</h3><p className="muted2">Comprar puts cuando el margen queda arriba del costo completo y el NDVI entra en zona buena/excelente.</p></div></div><div className="card"><div className="cardInner"><h3>Cobertura parcial</h3><p className="muted2">Vender por capas: 20% ahora, 20% por gatillo de precio, 20% por gatillo de margen.</p></div></div></div>
      </div>
    }

    function DataSection({fx,weatherPack,grainsPack,prefs}){
      const region = REGIONS[prefs.region];
      const yields = [
        {crop:'Maíz',dept:'Marcos Juárez',yield:'91 qq/ha',source:'MAGyP'},
        {crop:'Soja',dept:'Pergamino',yield:'38 qq/ha',source:'MAGyP'},

          <div className="card big"><div className="cardInner"><h3>Perfil de campo guardado</h3><p className="hint">Preferencias persistidas en localStorage.</p><div className="soilGrid" style={{marginTop:14}}><div className="soilItem"><small>Región</small><b>{prefs.region}</b></div><div className="soilItem"><small>Coordenadas</small><b>{Number(prefs.lat).toFixed(2)}, {Number(prefs.lon).toFixed(2)}</b></div><div className="soilItem"><small>Suelo</small><b>{region.soil}</b></div><div className="soilItem"><small>Fertilidad</small><b>{region.fertility}/100</b></div></div></div></div>

      </div>
    }

    function App(){
      const savedLocation = safeJsonRead('agradar-location', null);
      const savedUser = safeJsonRead('agradar-user', null);
      const [user,setUser] = useState(savedUser);
      const [active,setActive] = useState('overview');
      const [fx,setFx] = useState(null);
      const [weatherPack,setWeatherPack] = useState(null);
      const [grainsPack,setGrainsPack] = useState(null);
      const [prefs,setPrefsState] = useState(()=>({region:savedLocation?.region||'Pampas Norte', crop:'maiz', stage:'VT-R1', lat:savedLocation?.lat||REGIONS['Pampas Norte'].lat, lon:savedLocation?.lon||REGIONS['Pampas Norte'].lon}));
      const [inputs,setInputs] = useState({localPrice:565, importParity:610, ratioGap:-9, trend:'alcista', supply:'ajustada', inputName:'Urea'});
      const [satellite,setSatellite] = useState(()=>satelliteMetrics({crop:'maiz',stage:'VT-R1',region:'Pampas Norte',lat:REGIONS['Pampas Norte'].lat,lon:REGIONS['Pampas Norte'].lon}));
      const [confetti,setConfetti] = useState(false);
      const [lastUpdated,setLastUpdated] = useState(null);
      const setPrefs = (next)=>{setPrefsState(next); localStorage.setItem('agradar-preferences', JSON.stringify(next));};
      const recommendation = useMemo(()=>recomendar(inputs),[inputs]);

      async function refresh(){
        const [d,g] = await Promise.all([loadDollars(), loadGrains()]);
        setFx(d); setGrainsPack(g);
        const w = await loadWeather(prefs.lat,prefs.lon); setWeatherPack(w);
        setSatellite(satelliteMetrics({crop:prefs.crop,stage:prefs.stage,region:prefs.region,weather:w.data,lat:prefs.lat,lon:prefs.lon}));
        setLastUpdated(new Date());
      }
      useEffect(()=>{refresh()},[]);
      useEffect(()=>{loadWeather(prefs.lat,prefs.lon).then(w=>{setWeatherPack(w);setSatellite(satelliteMetrics({crop:prefs.crop,stage:prefs.stage,region:prefs.region,weather:w.data,lat:prefs.lat,lon:prefs.lon}))})},[prefs.lat,prefs.lon]);
      function login(provider){const u={name:provider==='Demo'?'Usuario demo':'Justo',provider,ts:Date.now()};localStorage.setItem('agradar-user',JSON.stringify(u));setUser(u)}
      function triggerConfetti(){ setConfetti(true); setTimeout(()=>setConfetti(false),1400); }
      function generatePdf(){
        const {jsPDF} = window.jspdf; const doc = new jsPDF({unit:'pt',format:'a4'}); let y=52;
        doc.setFillColor(7,9,11); doc.rect(0,0,595,842,'F'); doc.setTextColor(244,248,246); doc.setFont('helvetica','bold'); doc.setFontSize(24); doc.text('AgRadar — Reporte ejecutivo',42,y); y+=30;
        doc.setFont('helvetica','normal'); doc.setFontSize(10); doc.setTextColor(178,189,184); doc.text(`Generado: ${new Date().toLocaleString('es-AR')} · Región ${prefs.region} · ${prefs.lat}, ${prefs.lon}`,42,y); y+=34;
        const lines = [
          `Score compra de insumos: ${recommendation.score}/100 — ${recommendation.verdict}`,
          `Brecha paridad importación: ${pct(recommendation.gap)} · Bonus consistencia: +${recommendation.bonus}`,
          `NDVI ${satellite.ndvi} · EVI ${satellite.evi} · Estado ${satellite.stress}`,
          `Dólar blue: ${fx?.rows?.blue?.venta ? money(fx.rows.blue.venta) : 's/d'} · Oficial: ${fx?.rows?.oficial?.venta ? money(fx.rows.oficial.venta) : 's/d'}`,
          `Clima: ${weatherPack?.data?.current?.temperature_2m ?? 's/d'}°C · HR ${weatherPack?.data?.current?.relative_humidity_2m ?? 's/d'}% · fuente ${weatherPack?.source}`,
          `Recomendación: ${recommendation.score>=62?'comprar por capas y asegurar logística crítica.':'mantener monitoreo y preservar opcionalidad.'}`
        ];
        doc.setTextColor(244,248,246); doc.setFontSize(13); lines.forEach(l=>{doc.text(l,42,y,{maxWidth:510}); y+=24});
        y+=10; doc.setFont('helvetica','bold'); doc.text('Factores del scoring',42,y); y+=20; doc.setFont('helvetica','normal'); doc.setTextColor(178,189,184); doc.setFontSize(10);
        recommendation.factors.forEach(f=>{doc.text(`${f.sign} ${f.title} (x${f.weight}): ${f.explain}`,42,y,{maxWidth:510}); y+=36});
        y+=8; doc.setTextColor(139,152,147); doc.text('Fuentes: DolarAPI/Bluelytics, Open-Meteo, NASA GIBS/Worldview, BCR/MAGyP estructura pública. Prototipo single-file.',42,y,{maxWidth:510});
        doc.save('AgRadar_reporte.pdf');
      }
      const titleMap = {overview:'Cockpit integral',inputs:'Scoring de insumos',ndvi:'NDVI y campo',corr:'Correlaciones avanzadas',margins:'Márgenes y cobertura',data:'Fuentes y datasets'};
      return <>
        {confetti && <div className="confetti">{Array.from({length:38},(_,i)=><i key={i} style={{left:`${Math.random()*100}%`,animationDelay:`${Math.random()*.25}s`,background:i%3===0?'var(--blue)':i%3===1?'var(--mint)':'var(--amber)'}} />)}</div>}
        {!user && <LoginModal onLogin={login}/>}<div className="app"><Sidebar active={active} setActive={setActive}/><main className="main"><div className="topbar"><div><div className="eyebrow">● Agro intelligence cockpit</div><h1 className="title">{titleMap[active]}</h1><p className="subtitle">Plataforma single-file para inteligencia de mercados, agronomía de precisión, scoring de compra de insumos y simulación de márgenes para el agro argentino.</p></div><div className="topActions"><span className="userPill"><span className="avatar">{(user?.name||'D')[0]}</span>{user?.provider || 'Demo'} · {lastUpdated?`Actualizado ${lastUpdated.toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'})}`:'cargando...'}</span><button className="btn" onClick={refresh}>Actualizar</button><button className="btn primary" onClick={generatePdf}>Generar Reporte PDF</button></div></div>
          {active==='overview' && <Overview fx={fx} weatherPack={weatherPack} grainsPack={grainsPack} satellite={satellite} prefs={prefs} recommendation={recommendation} setActive={setActive}/>} 
          {active==='inputs' && <InputsSection inputs={inputs} setInputs={setInputs} recommendation={recommendation} triggerConfetti={triggerConfetti}/>} 
          {active==='ndvi' && <NDVISection prefs={prefs} setPrefs={setPrefs} weatherPack={weatherPack} satellite={satellite} setSatellite={setSatellite}/>} 
          {active==='corr' && <CorrelationSection/>}
          {active==='margins' && <MarginsSection prefs={prefs} setPrefs={setPrefs} grainsPack={grainsPack} weatherPack={weatherPack} satellite={satellite}/>} 
          {active==='data' && <DataSection fx={fx} weatherPack={weatherPack} grainsPack={grainsPack} prefs={prefs}/>} 
          <div className="footer">AgRadar prototipo premium single-file. No reemplaza asesoramiento agronómico, comercial ni financiero. Las fuentes públicas pueden cambiar, limitar CORS o demorar; el estado de cada conexión se muestra en “Datos”.</div>
        </main></div>
      </>;
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<ErrorBoundary><App/></ErrorBoundary>);
    window.__AGRADAR_RENDERED__ = true;
  </script>

  <script>
    setTimeout(function(){
      if(!window.__AGRADAR_RENDERED__){
        var el=document.getElementById('bootStatus');
        if(el){el.innerHTML='<b>Las librerías externas no terminaron de cargar.</b><br>Esto suele pasar al abrir el HTML como archivo local. Subilo como <code>index.html</code> a GitHub Pages y abrilo desde el link público, o verificá conexión a internet.';}
      }
    },7000);
  </script>
</body>
</html>
